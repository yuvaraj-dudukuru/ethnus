# ============================================================================
#  render.yaml — Blueprint for the Student Management REST API.
# ============================================================================
databases:
  - name: student-api-db
    databaseName: studentapi
    plan: free

services:
  - type: web
    name: student-rest-api
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn campushub.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "student-rest-api.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: student-api-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.6"
      # Comma-separated front-end origins allowed to call the API from a browser.
      - key: CORS_ALLOWED_ORIGINS
        value: ""
