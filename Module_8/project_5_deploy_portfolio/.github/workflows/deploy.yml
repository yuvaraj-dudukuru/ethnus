# ============================================================================
#  Deploy the static portfolio to GitHub Pages on every push to main.
#  Settings → Pages → Source: "GitHub Actions" must be enabled once.
# ============================================================================
name: Deploy Portfolio to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."            # the whole folder is the static site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
