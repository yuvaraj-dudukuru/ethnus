# ============================================================================
#  render.yaml — Blueprint for the Student Management System.
# ============================================================================
databases:
  - name: campushub-db
    databaseName: campushub
    plan: free

services:
  - type: web
    name: student-management
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn campushub.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "student-management.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: campushub-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.6"
      # --- Set USE_S3=true and fill the AWS_* keys for persistent photo storage ---
      - key: USE_S3
        value: "False"
