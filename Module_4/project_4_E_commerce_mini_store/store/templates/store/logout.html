{% extends 'store/base.html' %}
{% block title %}Logout{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center mt-5">
        <h2>You have been logged out.</h2>
        <p class="lead mt-3">Thank you for visiting our store.</p>
        <a href="{% url 'store:login' %}" class="btn btn-primary mt-3">Log in again</a>
        <a href="{% url 'store:product_list' %}" class="btn btn-outline-secondary mt-3">Back to Store</a>
    </div>
</div>
{% endblock %}
