{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center mt-4 mb-5">
    <div class="col-md-8">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4 p-md-5">
                <h2 class="fw-bold text-primary mb-4">
                    {% if form.instance.pk %}Edit Job{% else %}Post a New Job{% endif %}
                </h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex justify-content-end mt-4">
                        <a href="{% url 'recruiter_dashboard' %}" class="btn btn-light me-2 rounded-pill px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary rounded-pill px-4">Save Job</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
