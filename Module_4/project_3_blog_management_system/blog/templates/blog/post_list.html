{% extends 'blog/base.html' %}

{% block content %}
<h2>Latest Posts</h2>
<div class="post-list">
    {% for post in posts %}
    <div class="post-card">
        <h3><a href="{{ post.get_absolute_url }}">{{ post.title }}</a></h3>
        <p>By {{ post.author }} in <a href="{% url 'blog:category_list' post.category.slug %}">{{ post.category }}</a></p>
        <p>{{ post.body|truncatewords:30 }}</p>
        <p><small>{{ post.created|date:"F d, Y" }}</small></p>
    </div>
    {% empty %}
    <p>No posts available.</p>
    {% endfor %}
</div>
{% endblock %}
