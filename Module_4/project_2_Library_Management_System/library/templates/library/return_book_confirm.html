{% extends 'library/base.html' %}

{% block content %}
<h2>Confirm Return</h2>
<p>Are you sure you want to return the book <strong>{{ issue.book.title }}</strong> issued to <strong>{{ issue.member.name }}</strong>?</p>
<p>Current Fine: ${{ issue.fine }}</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirm Return</button>
    <a href="{% url 'library:member_detail' issue.member.pk %}" class="btn">Cancel</a>
</form>
{% endblock %}
