{% extends 'library/base.html' %}

{% block content %}
<h2>Members</h2>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Joined</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for member in members %}
        <tr>
            <td>{{ member.name }}</td>
            <td>{{ member.email }}</td>
            <td>{{ member.joined }}</td>
            <td>
                <a href="{% url 'library:member_detail' member.pk %}" class="btn">View</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No members found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
