<!DOCTYPE html>
{% load static %}
<!--
  ============================================================================
   dashboard.html — the SHELL of the Blog Management Dashboard (Module 6)
  ----------------------------------------------------------------------------
   Like every Module-6 page, this HTML only draws the STATIC FRAME:
       - a login bar
       - a search box
       - a "Write a new post" form (shown only when you are logged in)
       - an EMPTY feed area where post CARDS will be inserted
       - a spinner, a flash strip and empty/error placeholders
       - Previous / Next buttons

   It holds NO posts. Every card, comment and like count is built at runtime by
   JavaScript (static/js/dashboard.js), which talks to the Module-5 REST API.

   THREE IDEAS this project teaches:
     1) POST CARDS — JavaScript maps an array of posts to repeated card HTML
        (with every piece of user text safely ESCAPED).
     2) COMMENTS PER POST — each card can load its own comments from
        /api/posts/{slug}/comments/ and append them without a page reload.
     3) OPTIMISTIC LIKES ⭐ — clicking the heart bumps the number INSTANTLY,
        then POSTs in the background, and rolls the number back if it fails.
        This is the trick that makes apps feel "instant".

   Buttons that change data (like, comment, write) are AUTH-GATED: the page
   asks /api/me/ whether you are logged in and shows them only if you are.

   Bootstrap 5 (from a CDN) provides the styling.
  ============================================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Management Dashboard</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <style>
        /* A tiny touch: make the heart button look clickable and animate. */
        .like-btn { cursor: pointer; border: none; background: none; font-size: 1rem; }
        .like-btn.liked { color: #dc3545; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4" style="max-width: 800px;">

    <!-- ================= PAGE HEADING ================= -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">✍️ Blog Management Dashboard</h1>
        <a href="/api/docs/" target="_blank" class="btn btn-sm btn-outline-secondary">
            API Docs
        </a>
    </div>

    <!-- ================= LOGIN BAR =================
         Reading posts and comments works for everyone. Liking, commenting and
         writing a post require you to log in. Log in with:
            admin / admin     (an administrator)
            writer / writer   (a normal author)
    -->
    <div class="card mb-3">
        <div class="card-body py-2">
            <form id="login-form" class="row g-2 align-items-center">
                <div class="col-auto fw-semibold">Login:</div>
                <div class="col-auto">
                    <input type="text" id="login-username" class="form-control form-control-sm"
                           placeholder="username (writer)" autocomplete="username">
                </div>
                <div class="col-auto">
                    <input type="password" id="login-password" class="form-control form-control-sm"
                           placeholder="password (writer)" autocomplete="current-password">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-sm btn-primary">Login</button>
                </div>
            </form>
            <div id="logged-in-bar" class="d-none align-items-center gap-2">
                <span class="text-success fw-semibold">✓ Logged in as
                    <span id="current-user"></span></span>
                <button id="logout-btn" class="btn btn-sm btn-outline-danger">Logout</button>
            </div>
        </div>
    </div>

    <!-- ================= FLASH MESSAGE AREA ================= -->
    <div id="flash" class="alert d-none" role="alert"></div>

    <!-- ================= WRITE-A-POST FORM (logged-in only) ================= -->
    <div id="write-card" class="card mb-3 d-none">
        <div class="card-header fw-semibold">Write a new post</div>
        <div class="card-body">
            <form id="write-form">
                <div class="mb-2">
                    <input type="text" id="w-title" class="form-control"
                           placeholder="Post title" required>
                </div>
                <div class="row g-2 mb-2">
                    <div class="col-sm-6">
                        <select id="w-category" class="form-select">
                            <option value="">(no category)</option>
                        </select>
                    </div>
                    <div class="col-sm-6 d-flex align-items-center">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="w-publish" checked>
                            <label class="form-check-label" for="w-publish">
                                Publish now (uncheck to save as draft)
                            </label>
                        </div>
                    </div>
                </div>
                <div class="mb-2">
                    <textarea id="w-body" class="form-control" rows="3"
                              placeholder="Write your post…" required></textarea>
                </div>
                <button type="submit" class="btn btn-success">Publish post</button>
            </form>
        </div>
    </div>

    <!-- ================= SEARCH BOX ================= -->
    <div class="input-group mb-3">
        <span class="input-group-text">🔍</span>
        <input type="text" id="search" class="form-control"
               placeholder="Search posts by title or text…">
    </div>

    <!-- ================= STATUS PLACEHOLDERS ================= -->
    <div id="spinner" class="text-center my-4 d-none">
        <div class="spinner-border text-primary" role="status"></div>
        <div class="text-muted mt-2">Loading posts…</div>
    </div>
    <div id="empty-state" class="alert alert-secondary text-center d-none">
        No posts found.
    </div>
    <div id="error-state" class="alert alert-danger text-center d-none">
        ⚠️ Could not load posts from the server.
    </div>

    <!-- ================= THE FEED =================
         JavaScript inserts one .post-card per post into this container.
    -->
    <div id="feed"><!-- cards inserted here by dashboard.js --></div>

    <!-- ================= PAGINATION ================= -->
    <div class="d-flex justify-content-between align-items-center mt-3">
        <button id="prev-btn" class="btn btn-outline-primary" disabled>← Newer</button>
        <span id="page-info" class="text-muted">Page 1</span>
        <button id="next-btn" class="btn btn-outline-primary" disabled>Older →</button>
    </div>

</div><!-- /container -->

<!--
  A TEMPLATE for one post card. Using a <template> keeps the HTML structure out
  of the JavaScript: the JS clones this, fills in the blanks, and appends it.
  Nothing inside <template> is shown until JavaScript clones it.
-->
<template id="card-template">
    <div class="card mb-3 post-card">
        <div class="card-body">
            <h5 class="card-title mb-1 js-title"></h5>
            <h6 class="card-subtitle mb-2 text-muted small js-meta"></h6>
            <div class="d-flex align-items-center gap-3 mb-2">
                <button class="like-btn js-like" title="Like this post">
                    🤍 <span class="js-like-count">0</span>
                </button>
                <button class="btn btn-sm btn-link p-0 js-toggle-comments">💬 Comments</button>
            </div>
            <!-- The comments area starts hidden; it expands on first click. -->
            <div class="js-comments d-none border-top pt-2">
                <div class="js-comment-list small"></div>
                <!-- Comment form (only shown to logged-in users by the JS). -->
                <form class="js-comment-form d-none mt-2">
                    <div class="input-group input-group-sm">
                        <input type="text" class="form-control js-comment-input"
                               placeholder="Add a comment…" required>
                        <button class="btn btn-outline-primary" type="submit">Send</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</template>

<script src="{% static 'js/dashboard.js' %}"></script>
</body>
</html>
