{% extends "base.html" %}
{% load static %}
{% block title %}Exams &middot; Examly{% endblock %}

{% block content %}
<div class="hero">
  <h1>Examly</h1>
  <p>Take a timed, auto-graded exam. One attempt each — good luck!</p>
</div>

<div class="card" id="list-view">
  <h2>Available exams</h2>
  <div class="grid" id="exams"><p class="empty">Loading…</p></div>
</div>

<div class="card" id="take-view" style="display:none">
  <div class="toolbar">
    <h2 id="exam-title" class="grow"></h2>
    <span class="badge warn" id="timer">--:--</span>
  </div>
  <form id="quiz"></form>
  <button class="btn primary" id="submit-btn">Submit exam</button>
  <button class="btn small" id="cancel-btn">Cancel</button>
</div>

<div class="card" id="result-view" style="display:none">
  <h2>Result</h2>
  <p id="result" class="price"></p>
  <button class="btn" id="done-btn">Back to exams</button>
</div>
{% endblock %}

{% block scripts %}
<script>window.LOGGED_IN = {{ user.is_authenticated|yesno:"true,false" }};</script>
<script src="{% static 'js/exam.js' %}"></script>
{% endblock %}
